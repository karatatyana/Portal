<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Обучающий портал</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
<div id="userPanel" style="display:none; justify-content:flex-end; padding:10px; gap:10px;">
  <span id="userName"></span>

  <!-- КНОПКА АДМИНА -->
  <div id="adminButton" style="display:none;">
    <button onclick="openAdminPanel()">Админ</button>
  </div>

  <button onclick="signOut()">Выйти</button>
</div>


<!-- ===== АВТОРИЗАЦИЯ ===== -->
<div id="authBlock">
  <div class="auth-glass">

    <img src="images/logo2.png" class="auth-logo">

    <h2>Курс «Я — логист»</h2>
    <p class="auth-subtitle">Вход в обучающую платформу</p>

    <input type="text" id="name" placeholder="Ваше имя (для регистрации)">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">

    <button class="auth-btn primary" onclick="signIn()">Войти</button>
    <button class="auth-btn secondary" onclick="signUp()">Регистрация</button>

    <p id="authMessage"></p>

  </div>
</div>


<!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
<div class="layout" id="mainContent" style="display:none;">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="images/logo.png" id="siteLogo">
    </div>

    <h2>Курс «Я — логист»</h2>
    <div id="sidebarMenu"></div>
  </aside>

  <main class="main">

    <div class="progress-wrapper">
      <div class="progress-info">
        Прогресс прохождения курса:
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <div id="content">
      <div id="modulesGrid" class="modules-grid"></div>
    </div>

  </main>
</div>


<!-- ===== ЭКРАН АДМИНКИ ===== -->
<div id="adminScreen" style="display:none; padding:30px;">

  <h2>Прогресс учеников</h2>

  <div id="adminUsersList"></div>

  <br><br>

  <button onclick="closeAdminPanel()">← Назад</button>

</div>


<!-- ===== СКРИПТЫ ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
