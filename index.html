<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Обучающий портал</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
<div id="userPanel">

  <div class="panel-left">
    <div id="siteLogo" class="logo">
  <img src="images/logo.png" alt="LOGISTIKA PRO">
</div>
  </div>

  <div class="panel-right">
    <div id="adminButton" style="display:none;">
      <button class="btn btn-secondary" onclick="openAdminPanel()">
        Админ
      </button>
    </div>

    <button class="btn btn-primary" onclick="signOut()">
      Выйти
    </button>
  </div>

</div>


<!-- ===== АВТОРИЗАЦИЯ ===== -->
<div id="authBlock">
  <div class="auth-glass">

    <img src="images/logo2.png" class="auth-logo">

    <h2>Курс «Я — логист»</h2>
    <p class="auth-subtitle">Вход в обучающую платформу</p>

    <input type="text" id="name" placeholder="Ваше имя (для регистрации)">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">

    <button class="auth-btn primary" onclick="signIn()">Войти</button>
    <button class="auth-btn secondary" onclick="signUp()">Регистрация</button>

    <p id="authMessage"></p>

  </div>
</div>


<!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
<div class="layout" id="mainContent" style="display:none;">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <h3>Курс «Я — логист»</h3>
    <div id="sidebarMenu"></div>
  </aside>

  <!-- ===== MAIN PAGE ===== -->
  <main class="main">


    <!-- ===== ПРОГРЕСС ===== -->
<div class="progress-wrapper" id="globalProgress" style="display:none;">

  <div class="progress-header">
    <span>Прогресс прохождения курса</span>
    <span id="progressPercent" class="progress-percent">0%</span>
  </div>

  <div class="progress-bar">
    <div id="progressFill" class="progress-fill"></div>
  </div>

</div>

    <!-- ===== ДИНАМИЧЕСКИЙ КОНТЕНТ ===== -->
    <div id="content">
      <div id="modulesGrid" class="modules-grid"></div>
    </div>

  </main>

</div>


<!-- ===== ЭКРАН АДМИНКИ ===== -->
<div id="adminScreen" style="display:none; padding:30px;">

  <h2>Прогресс учеников</h2>

  <div id="adminUsersList"></div>

  <button class="btn btn-primary" onclick="closeAdminPanel()">
    ← Вернуться к обучению
  </button>

</div>


<!-- ===== СКРИПТЫ ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
